name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '9.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore backend/NaijaShield.sln

      - name: Build
        run: dotnet build backend/NaijaShield.sln -c Release --no-restore

      - name: Unit Tests
        run: dotnet test backend/tests/NaijaShield.UnitTests/NaijaShield.UnitTests.csproj \
          -c Release --no-build \
          --logger "trx;LogFileName=unit-tests.trx" \
          --collect:"XPlat Code Coverage"

      - name: Architecture Tests
        run: dotnet test backend/tests/NaijaShield.ArchitectureTests/NaijaShield.ArchitectureTests.csproj \
          -c Release --no-build \
          --logger "trx;LogFileName=arch-tests.trx"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage.cobertura.xml'

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'backend/'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f backend/docker/Dockerfile -t naijashield-api:${{ github.sha }} backend/

      - name: Build Jobs image
        run: docker build -f backend/docker/Dockerfile.jobs -t naijashield-jobs:${{ github.sha }} backend/
