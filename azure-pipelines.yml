# NaijaShield AI — Azure DevOps Pipeline
# Stages: Build & Test → Docker Build & Push → Deploy Staging → Deploy Production
#
# Prerequisites (run scripts/setup-azdo.ps1 once):
#   Service connections : naijashield-azure-rm  (Azure Resource Manager)
#                         naijashield-acr        (Docker Registry → ACR)
#   Variable group      : naijashield-vars       (in Pipelines > Library)
#   Environments        : staging, production    (production has approval gate)

trigger:
  branches:
    include: [main]

variables:
  - group: naijashield-vars          # ACR_REGISTRY, AZURE_RG, SQL_CONN, FRONTEND_URL
  - name: DOTNET_VERSION
    value: '9.0.x'
  - name: SOLUTION
    value: 'backend/NaijaShield.sln'
  - name: IMAGE_API
    value: '$(ACR_REGISTRY)/naijashield-api'
  - name: IMAGE_JOBS
    value: '$(ACR_REGISTRY)/naijashield-jobs'
  - name: IMAGE_TAG
    value: 'sha-$(Build.SourceVersion)'
  # Actual Azure resource names
  - name: RESOURCE_GROUP
    value: 'ODL-Covenant-2200446'
  - name: CONTAINERAPP_API
    value: 'naijashield-api-dev'
  - name: CONTAINERAPP_JOBS
    value: 'naijashield-jobs-dev'

# ── Stage 1: Build & Test ──────────────────────────────────────────────────────
stages:
  - stage: BuildAndTest
    displayName: Build & Test
    jobs:

      - job: UnitTests
        displayName: Build & Unit Tests
        pool: NaijaShield-Self-Hosted
        steps:
          - task: UseDotNet@2
            displayName: Install .NET $(DOTNET_VERSION)
            inputs:
              version: $(DOTNET_VERSION)

          - script: dotnet restore $(SOLUTION)
            displayName: Restore

          - script: dotnet build $(SOLUTION) -c Release --no-restore
            displayName: Build (Release)

          - script: |
              dotnet test backend/tests/NaijaShield.UnitTests/ \
                -c Release --no-build \
                --logger "trx;LogFileName=unit-results.xml" \
                --collect:"XPlat Code Coverage"
            displayName: Unit Tests

          - task: PublishTestResults@2
            displayName: Publish unit test results
            condition: always()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '**/unit-results.xml'
              testRunTitle: Unit Tests

      - job: IntegrationTests
        displayName: Integration Tests (Testcontainers)
        dependsOn: UnitTests
        pool: NaijaShield-Self-Hosted
        steps:
          - task: UseDotNet@2
            displayName: Install .NET $(DOTNET_VERSION)
            inputs:
              version: $(DOTNET_VERSION)

          - script: dotnet restore $(SOLUTION)
            displayName: Restore

          - script: dotnet build $(SOLUTION) -c Release --no-restore
            displayName: Build (Release)

          - script: |
              dotnet test backend/tests/NaijaShield.IntegrationTests/ \
                -c Release --no-build \
                --logger "trx;LogFileName=integration-results.xml"
            displayName: Integration Tests

          - task: PublishTestResults@2
            displayName: Publish integration test results
            condition: always()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '**/integration-results.xml'
              testRunTitle: Integration Tests

# ── Stage 2: Docker Build & Push ──────────────────────────────────────────────
  - stage: DockerBuildPush
    displayName: Docker Build & Push to ACR
    dependsOn: BuildAndTest
    jobs:
      - job: Docker
        displayName: Build & push images
        pool: NaijaShield-Self-Hosted
        steps:
          - task: Docker@2
            displayName: Build & push API image
            inputs:
              containerRegistry: naijashield-acr
              repository: naijashield-api
              command: buildAndPush
              Dockerfile: backend/docker/Dockerfile
              buildContext: backend
              tags: |
                $(IMAGE_TAG)
                latest

          - task: Docker@2
            displayName: Build & push BackgroundJobs image
            inputs:
              containerRegistry: naijashield-acr
              repository: naijashield-jobs
              command: buildAndPush
              Dockerfile: backend/docker/Dockerfile.jobs
              buildContext: backend
              tags: |
                $(IMAGE_TAG)
                latest

# ── Stage 3: Deploy ───────────────────────────────────────────────────────────
  - stage: Deploy
    displayName: Deploy
    dependsOn: DockerBuildPush
    jobs:
      - deployment: DeployDev
        displayName: Deploy to dev
        pool: NaijaShield-Self-Hosted
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Run DB migrations
                  inputs:
                    azureSubscription: naijashield-azure-rm
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az container create \
                        --resource-group $(RESOURCE_GROUP) \
                        --name naijashield-migrate \
                        --image $(IMAGE_API):$(IMAGE_TAG) \
                        --registry-server $(ACR_REGISTRY) \
                        --registry-username $(ACR_USERNAME) \
                        --registry-password $(ACR_PASSWORD) \
                        --environment-variables \
                          ASPNETCORE_ENVIRONMENT=Staging \
                          RUN_MIGRATIONS_ONLY=true \
                        --secure-environment-variables \
                          ConnectionStrings__DefaultConnection="$(SQL_CONN)" \
                        --restart-policy Never \
                        --os-type Linux

                - task: AzureCLI@2
                  displayName: Update Container App — API
                  inputs:
                    azureSubscription: naijashield-azure-rm
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp update \
                        --name $(CONTAINERAPP_API) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $(IMAGE_API):$(IMAGE_TAG) \
                        --set-env-vars \
                          "AllowedOrigins__0=https://app.naijashield.ng" \
                          "AllowedOrigins__1=$(FRONTEND_URL)"

                - task: AzureCLI@2
                  displayName: Update Container App — Jobs
                  inputs:
                    azureSubscription: naijashield-azure-rm
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp update \
                        --name $(CONTAINERAPP_JOBS) \
                        --resource-group $(RESOURCE_GROUP) \
                        --image $(IMAGE_JOBS):$(IMAGE_TAG)

                - script: |
                    sleep 30
                    curl --fail https://api.naijashield.ai/health || exit 1
                  displayName: Health check
