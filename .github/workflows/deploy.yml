name: Build, Test & Deploy — NaijaShield AI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION: backend/NaijaShield.sln
  API_PROJECT: backend/src/NaijaShield.Api/NaijaShield.Api.csproj
  JOBS_PROJECT: backend/src/NaijaShield.BackgroundJobs/NaijaShield.BackgroundJobs.csproj
  ACR_LOGIN_SERVER: ${{ secrets.ACR_REGISTRY }}

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build (Release)
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test backend/tests/NaijaShield.UnitTests/ \
            -c Release --no-build \
            --logger "trx;LogFileName=unit-results.xml" \
            --collect:"XPlat Code Coverage" || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/*.trx'

  # ── Integration Tests ─────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} -c Release --no-restore

      - name: Run integration tests
        run: |
          dotnet test backend/tests/NaijaShield.IntegrationTests/ \
            -c Release --no-build \
            --logger "trx;LogFileName=integration-results.xml"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/*.trx'

  # ── Docker Build & Push ───────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push to ACR
    runs-on: ubuntu-latest
    needs: integration-tests
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_REGISTRY }}

      - name: Docker meta — API
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_LOGIN_SERVER }}/naijashield-api
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/src/NaijaShield.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_CONFIGURATION=Release

      - name: Build and push BackgroundJobs image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/src/NaijaShield.BackgroundJobs/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/naijashield-jobs:sha-${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/naijashield-jobs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: staging
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run DB Migrations (staging)
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RG_STAGING }} \
            --name naijashield-migrate-staging \
            --image ${{ secrets.ACR_REGISTRY }}/naijashield-api:sha-${{ github.sha }} \
            --registry-server ${{ secrets.ACR_REGISTRY }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --environment-variables \
              ASPNETCORE_ENVIRONMENT=Staging \
              RUN_MIGRATIONS_ONLY=true \
            --secure-environment-variables \
              ConnectionStrings__DefaultConnection=${{ secrets.SQL_CONN_STAGING }} \
            --restart-policy Never \
            --os-type Linux

      - name: Update Container App — API (staging)
        run: |
          az containerapp update \
            --name naijashield-api-staging \
            --resource-group ${{ secrets.AZURE_RG_STAGING }} \
            --image ${{ secrets.ACR_REGISTRY }}/naijashield-api:sha-${{ github.sha }}

      - name: Update Container App — Jobs (staging)
        run: |
          az containerapp update \
            --name naijashield-jobs-staging \
            --resource-group ${{ secrets.AZURE_RG_STAGING }} \
            --image ${{ secrets.ACR_REGISTRY }}/naijashield-jobs:sha-${{ github.sha }}

      - name: Health check — staging
        run: |
          sleep 30
          curl --fail https://api-staging.naijashield.ai/health || exit 1

  # ── Deploy to Production (manual approval required) ──────────────────────────
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production           # requires manual approval in GitHub Environments
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run DB Migrations (production)
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RG_PROD }} \
            --name naijashield-migrate-prod \
            --image ${{ secrets.ACR_REGISTRY }}/naijashield-api:sha-${{ github.sha }} \
            --registry-server ${{ secrets.ACR_REGISTRY }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --environment-variables \
              ASPNETCORE_ENVIRONMENT=Production \
              RUN_MIGRATIONS_ONLY=true \
            --secure-environment-variables \
              ConnectionStrings__DefaultConnection=${{ secrets.SQL_CONN_PROD }} \
            --restart-policy Never \
            --os-type Linux

      - name: Update Container App — API (production)
        run: |
          az containerapp update \
            --name naijashield-api-prod \
            --resource-group ${{ secrets.AZURE_RG_PROD }} \
            --image ${{ secrets.ACR_REGISTRY }}/naijashield-api:sha-${{ github.sha }}

      - name: Update Container App — Jobs (production)
        run: |
          az containerapp update \
            --name naijashield-jobs-prod \
            --resource-group ${{ secrets.AZURE_RG_PROD }} \
            --image ${{ secrets.ACR_REGISTRY }}/naijashield-jobs:sha-${{ github.sha }}

      - name: Health check — production
        run: |
          sleep 30
          curl --fail https://api.naijashield.ai/health || exit 1

      - name: Tag release
        run: |
          git tag "release-$(date +'%Y%m%d-%H%M')-${{ github.sha }}"
          git push --tags
